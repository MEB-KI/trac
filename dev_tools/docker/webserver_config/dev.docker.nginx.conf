server {
    listen 3000;
    server_name localhost;

    # Temporary directory for buffering large request bodies (e.g., study configuration imports with embedded activities).
    # In Docker, this ensures consistent buffering behavior across different container configurations.
    client_body_temp_path /var/lib/nginx/tmp;

    location = /favicon.ico {
        alias /usr/share/nginx/html/report/favicon.ico;
    }

    location /report/ {
        alias /usr/share/nginx/html/report/;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /tud_backend/ {
        proxy_pass http://backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        return 404 "This development server only serves paths under '/report/' and '/tud_backend/'.\n\nTry:\n  * frontend: /report/index.html\n  * API docs: /tud_backend/api/docs\n  * admin interface: /tud_backend/admin\n";
    }
}
